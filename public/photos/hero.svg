<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0E10"/>
      <stop offset="100%" stop-color="#5B2A86"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="24" height="24" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="24" stroke="#F2EDE4" stroke-width="2" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#hatch)"/>
  <circle cx="1300" cy="200" r="260" fill="#E0531F" opacity="0.18"/>
  <circle cx="240" cy="780" r="320" fill="#7B2CBF" opacity="0.22"/>

  <g font-family="system-ui,sans-serif" fill="#F2EDE4" text-anchor="middle">
    <text x="800" y="430" font-size="22" letter-spacing="6" font-weight="500" opacity="0.65">PLACEHOLDER · PHOTO HERO</text>
    <text x="800" y="500" font-size="60" font-weight="900" letter-spacing="-2">1600 × 900</text>
    <text x="800" y="550" font-size="16" letter-spacing="4" opacity="0.5">REMPLACER PAR UNE PHOTO LANDSCAPE 16:9</text>
  </g>
</svg>
