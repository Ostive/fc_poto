<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-gl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0531F"/>
      <stop offset="100%" stop-color="#5B2A86"/>
    </linearGradient>
    <pattern id="hatch-gl" patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="22" stroke="#F2EDE4" stroke-width="2" stroke-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg-gl)"/>
  <rect width="1200" height="800" fill="url(#hatch-gl)"/>
  <circle cx="200" cy="600" r="220" fill="#0E0E10" opacity="0.25"/>
  <g font-family="system-ui,sans-serif" fill="#F2EDE4" text-anchor="middle">
    <text x="600" y="370" font-size="20" letter-spacing="5" font-weight="500" opacity="0.7">PLACEHOLDER · GALERIE LANDSCAPE</text>
    <text x="600" y="440" font-size="56" font-weight="900" letter-spacing="-2">1200 × 800</text>
    <text x="600" y="490" font-size="14" letter-spacing="4" opacity="0.55">RATIO 3:2 — VISUEL HORIZONTAL</text>
  </g>
</svg>
